    <circle cx="14" cy="6" r="4" /><circle cx="14" cy="6" r="1.5" />
    <rect x="-8" y="-8" width="6" height="5" rx="1" />
    <rect x="2" y="-8" width="6" height="5" rx="1" />
  </g>
  <!-- 2. Pistón con aros -->
  <g id="piston" transform="translate(90,30)">
