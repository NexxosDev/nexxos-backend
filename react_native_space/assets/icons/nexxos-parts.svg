<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 60" width="660" height="60" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- 1. Carrito sedan perfil lateral -->
  <g id="car" transform="translate(30,30)">
