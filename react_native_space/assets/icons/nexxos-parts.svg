    <circle cx="0" cy="0" r="6" />
    <path d="M0,-19 L3,-15 L3,-13 A13,13,0,0,1,7.8,-10.4 L9.5,-11.8 L13,-9.5 L11.5,-7 L12,-5 A13,13,0,0,1,13,0 L15.5,0.5 L15,4.5 L12,4 L11,5.8 A13,13,0,0,1,7.8,10.4 L9,12.5 L6,15 L4,12.5 L2,12.8 A13,13,0,0,1,-2,12.8 L-4,12.5 L-6,15 L-9,12.5 L-7.8,10.4 A13,13,0,0,1,-11,5.8 L-12,4 L-15,4.5 L-15.5,0.5 L-13,0 A13,13,0,0,1,-12,-5 L-11.5,-7 L-13,-9.5 L-9.5,-11.8 L-7.8,-10.4 A13,13,0,0,1,-3,-13 L-3,-15 Z" />
