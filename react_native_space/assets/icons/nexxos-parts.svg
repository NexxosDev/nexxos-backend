    <circle cx="12" cy="0" r="1.5" fill="#888" stroke="none" />
    <circle cx="-12" cy="0" r="1.5" fill="#888" stroke="none" />
    <circle cx="0" cy="12" r="1.5" fill="#888" stroke="none" />
    <circle cx="0" cy="-12" r="1.5" fill="#888" stroke="none" />
    <circle cx="8.5" cy="8.5" r="1.5" fill="#888" stroke="none" />
    <circle cx="-8.5" cy="8.5" r="1.5" fill="#888" stroke="none" />
